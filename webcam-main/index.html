<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Guard webcam</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- 2-1. 시작 페이지 -->
        <div id="start-page" class="page-section active">
            <img src="./img/soldier1.png" class="side-img left-img" alt="왼쪽 장식">
            <img src="./img/soldier2.png" class="side-img right-img" alt="오른쪽 장식">
            <h1>
                <img src="./img/study guard.png" alt="Study Guard" style="max-width: 300px; width: 100%; height: auto;">
            </h1>
            <div class="input-group">
                <label for="study-time-input">목표 시간 (최소 30분)</label>
                <input type="number" id="study-time-input" min="30" value="30">
            </div>
            <button id="real-start-btn" class="primary-btn" style="background: transparent; border: none; padding: 0; cursor: pointer;">
                <img src="./img/start.png" alt="START" style="max-width: 150px; height: auto;">
            </button>
            <button id="go-record-btn" class="primary-btn" style="background: transparent; border: none; padding: 0; cursor: pointer; margin-top: 10px;">
                <img src="./img/record.png" alt="기록 보기" style="max-width: 150px; height: auto;">
            </button>
        </div>

        <!-- 메인 감시 페이지 -->
        <div id="main-page" class="page-section">
        <main class="content-area">
            <section class="npc-section">
                <div class="label">npc</div>
                <div id="npc-placeholder" class="placeholder">NPC 영상 대기 중</div>
                <video id="npc-video" style="display: none;" playsinline></video>
            </section>

            <section class="side-section">
                <div class="webcam-box">
                    <div class="label">웹캠</div>
                    <div id="webcam-container"></div>
                </div>
                
                <div class="prediction-box">
                    <div class="label">인식 결과</div>
                    <div id="prediction-text" class="prediction-text">대기 중...</div>
                    <div id="label-container" class="label-container"></div>
                </div>
                
                <div class="status-indicators">
                  <div class="circle heart"></div>
                  <div class="circle heart"></div>
                  <div class="circle heart"></div>

                </div>
            </section>
        </main>

        <footer class="bottom-bar">
            <div id="status-text" class="status-text">상태 : 대기 중</div>
            <button id="success-btn" type="button" style="background-color: #2ecc71; color: white; margin-right: 10px; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer;">성공</button>
            <button id="fail-btn" type="button" style="background-color: #e74c3c; color: white;">실패</button>
            <button id="exit-btn" style="background: transparent; border: none; padding: 0; cursor: pointer; vertical-align: middle;">
                <img src="./img/stop.png" alt="종료" style="max-width: 120px; height: auto;">
            </button>
        </footer>
        </div>

        <!-- 2-2. 성공/실패 페이지 -->
        <div id="result-page" class="page-section">
            <h1 id="result-title">결과</h1>
            <p id="result-message"></p>
            <button id="go-home-btn" class="primary-btn" style="background: transparent; border: none; padding: 0; cursor: pointer;">
                <img src="./img/home.png" alt="처음으로" style="max-width: 150px; height: auto;">
            </button>
        </div>

        <!-- 2-3. 기록 페이지 -->
        <div id="record-page" class="page-section">
            <header class="record-top-bar">
                <button id="back-to-lobby-btn" class="back-btn" style="background: transparent; border: none; padding: 0; cursor: pointer;">
                    <img src="./img/home.png" alt="대기실로 복귀" style="max-width: 150px; height: auto;">
                </button>
            </header>

            <div class="record-container">
                <div class="record-summary">
                    <h2>오늘의 집중 기록 : <span id="today-time">00 : 00 : 00</span></h2>
                </div>

                <div class="record-menu-grid">
                    <div class="record-card" id="show-analysis-btn">
                        <h3>행동 분석망</h3>
                    </div>
                    <div class="record-card" id="show-log-btn">
                        <h3>작전 로그</h3>
                    </div>
                </div>

                <!-- 작전 로그 기록 테이블 추가 -->
                <div class="log-section" id="log-section" style="display: none;">
                    <h3>작전 로그 (상태 변화 기록)</h3>
                    <div class="table-wrapper">
                        <table class="log-table">
                            <thead>
                                <tr>
                                    <th>시간</th>
                                    <th>상태</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body">
                                <!-- JS에서 내용 추가 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 행동 분석망 도넛 그래프 추가 -->
                <div class="analysis-section" id="analysis-section" style="display: none;">
                    <h3>행동 분석망 (행동 비율)</h3>
                    <div class="chart-wrapper">
                        <canvas id="behavior-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
